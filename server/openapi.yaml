openapi: 3.0.3
info:
  title: MyCalorie API
  version: "1.0.0"
  description: Backend API for the MyCalorie Flutter app.
servers:
  - url: https://mct.up.railway.app
    description: Production (Railway)
  - url: http://localhost:3000
    description: Local dev server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Sex:
      type: string
      enum: [MALE, FEMALE]
    ActivityLevel:
      type: string
      enum: [SEDENTARY, LIGHT, MODERATE, ACTIVE, VERY_ACTIVE]
    GoalType:
      type: string
      enum: [LOSE, MAINTAIN, GAIN]
    MealType:
      type: string
      enum: [BREAKFAST, LUNCH, DINNER, SNACK]
    FoodSource:
      type: string
      enum: [OPEN_FOOD_FACTS, MYFCD, CUSTOM]

    Error:
      type: object
      properties:
        error:
          type: string

    AuthCredentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthToken:
      type: object
      properties:
        token:
          type: string

    SignupResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string

    Profile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        dateOfBirth:
          type: string
          format: date-time
          nullable: true
        sex:
          $ref: "#/components/schemas/Sex"
        heightCm:
          type: number
          nullable: true
        activityLevel:
          $ref: "#/components/schemas/ActivityLevel"
        goalType:
          $ref: "#/components/schemas/GoalType"
        goalWeightKg:
          type: number
          nullable: true
        milestoneWeightKg:
          type: number
          nullable: true
        proteinTargetG:
          type: number
          nullable: true
          description: User-set value if present, otherwise weightKg * 1.7
        weeklyLossGoalKg:
          type: number
          description: Weekly weight-change pace in kg (0.25-1.0). Daily calorie adjustment is weeklyLossGoalKg * 7700 / 7, subtracted for LOSE and added for GAIN.
        useCustomCalorieTargets:
          type: boolean
          description: When false, weekdayTargetCalories and weekendTargetCalories are both the auto TDEE target.
        weekdayTargetCalories:
          type: number
          nullable: true
          description: Effective (resolved) weekday calorie target.
        weekendTargetCalories:
          type: number
          nullable: true
          description: Effective (resolved) weekend calorie target.
        latestWeightKg:
          type: number
          nullable: true
        profileComplete:
          type: boolean
        tdee:
          type: object
          nullable: true
          properties:
            maintenanceTdee:
              type: number
            targetCalories:
              type: number

    ProfileUpdate:
      type: object
      properties:
        dateOfBirth:
          type: string
          format: date
          example: "1995-06-15"
        sex:
          $ref: "#/components/schemas/Sex"
        heightCm:
          type: number
          example: 175
        activityLevel:
          $ref: "#/components/schemas/ActivityLevel"
        goalType:
          $ref: "#/components/schemas/GoalType"
        weightKg:
          type: number
          example: 70
        goalWeightKg:
          type: number
          example: 69
        milestoneWeightKg:
          type: number
          example: 75
        proteinTargetG:
          type: number
          example: 150
        weeklyLossGoalKg:
          type: number
          minimum: 0.25
          maximum: 1.0
          example: 0.5
        useCustomCalorieTargets:
          type: boolean
          example: true
        weekdayTargetCalories:
          type: number
          example: 1700
        weekendTargetCalories:
          type: number
          example: 2200

    FoodItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        caloriesPer100g:
          type: number
        proteinPer100g:
          type: number
        carbsPer100g:
          type: number
        fatPer100g:
          type: number
        barcode:
          type: string
          nullable: true
        photoBase64:
          type: string
          nullable: true
          description: Raw base64-encoded image data (no data-URI prefix).
        source:
          $ref: "#/components/schemas/FoodSource"
        createdByUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        isRecent:
          type: boolean
          description: Only present on the no-search default list.

    FoodItemCreate:
      type: object
      required: [name, caloriesPer100g, proteinPer100g, carbsPer100g, fatPer100g]
      properties:
        name:
          type: string
          example: Nasi Lemak
        caloriesPer100g:
          type: number
          example: 200
        proteinPer100g:
          type: number
          example: 5
        carbsPer100g:
          type: number
          example: 25
        fatPer100g:
          type: number
          example: 9
        barcode:
          type: string
        photoBase64:
          type: string

    FoodImport:
      type: object
      description: >-
        Fixed shape for macro estimates worked out in a claude.ai chat (e.g.
        reading a label together, or calculating a meal from known
        components) and imported as a custom food without retyping. `source`
        here describes how the *chat* arrived at the numbers — unrelated to
        FoodItem's own `source` enum, which this endpoint always sets to
        CUSTOM.
      required: [name, estimatedTotalWeightG, macrosPer100g]
      properties:
        name:
          type: string
          example: Burrito Wrap (rice + chicken)
        estimatedTotalWeightG:
          type: number
          example: 300
        macrosPer100g:
          type: object
          required: [kcal, proteinG, carbsG, fatG]
          properties:
            kcal:
              type: number
            proteinG:
              type: number
            carbsG:
              type: number
            fatG:
              type: number
          example: { kcal: 175, proteinG: 14.7, carbsG: 17.3, fatG: 5.2 }
        totalMacros:
          type: object
          description: >-
            macrosPer100g × (estimatedTotalWeightG / 100). Optional, but if
            present must be within ~10% of that — a sanity check against
            obvious calculation errors, not treated as authoritative.
          properties:
            kcal:
              type: number
            proteinG:
              type: number
            carbsG:
              type: number
            fatG:
              type: number
          example: { kcal: 525, proteinG: 44, carbsG: 52, fatG: 15 }
        confidence:
          type: string
          example: "estimate - based on known component macros"
        source:
          type: string
          enum: [photo_estimate, label_read, manual_calculation]
        dateLogged:
          type: string
          format: date-time
          description: When known; informational only (not applied by this endpoint).

    FoodItemUpdate:
      type: object
      properties:
        name:
          type: string
        caloriesPer100g:
          type: number
        proteinPer100g:
          type: number
        carbsPer100g:
          type: number
        fatPer100g:
          type: number
        photoBase64:
          type: string
          nullable: true

    LogEntry:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        foodItemId:
          type: string
        servingGrams:
          type: number
        mealType:
          $ref: "#/components/schemas/MealType"
        loggedAt:
          type: string
          format: date-time
        calories:
          type: number
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        foodItem:
          type: object
          properties:
            name:
              type: string

    LogEntryCreate:
      type: object
      required: [foodItemId, servingGrams, mealType]
      properties:
        foodItemId:
          type: string
        servingGrams:
          type: number
          example: 250
        mealType:
          $ref: "#/components/schemas/MealType"
        loggedAt:
          type: string
          format: date-time

    DailyLog:
      type: object
      properties:
        date:
          type: string
          example: "2026-07-05"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        totals:
          type: object
          properties:
            calories:
              type: number
            protein:
              type: number
            carbs:
              type: number
            fat:
              type: number

    WeightLog:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        weightKg:
          type: number
        recordedAt:
          type: string
          format: date-time

    WeightLogCreate:
      type: object
      required: [weightKg]
      properties:
        weightKg:
          type: number
          example: 70
        recordedAt:
          type: string
          format: date-time

    VisionLogRequest:
      type: object
      required: [image, mediaType, mode]
      properties:
        image:
          type: string
          description: Raw base64-encoded image data (no data-URI prefix).
        mediaType:
          type: string
          enum: [image/jpeg, image/png, image/gif, image/webp]
        mode:
          type: string
          enum: [label, plate]

    VisionLogLabelResult:
      type: object
      properties:
        name:
          type: string
        caloriesPer100g:
          type: number
        proteinPer100g:
          type: number
        carbsPer100g:
          type: number
        fatPer100g:
          type: number
        sodiumPer100gMg:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
        notes:
          type: string

    VisionLogPlateResult:
      type: object
      properties:
        description:
          type: string
        ingredients:
          type: array
          items:
            type: string
        estimatedServingGrams:
          type: number
        caloriesMin:
          type: number
        caloriesMax:
          type: number
        proteinGramsMin:
          type: number
        proteinGramsMax:
          type: number
        carbsGramsMin:
          type: number
        carbsGramsMax:
          type: number
        fatGramsMin:
          type: number
        fatGramsMax:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
        notes:
          type: string

    VisionLogResponse:
      type: object
      properties:
        mode:
          type: string
          enum: [label, plate]
        result:
          oneOf:
            - $ref: "#/components/schemas/VisionLogLabelResult"
            - $ref: "#/components/schemas/VisionLogPlateResult"

    Exercise:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        formCue:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        dayTag:
          type: string
          nullable: true
          description: "Monday / Wednesday / Friday for the seeded routine, null for custom exercises"
        defaultSets:
          type: integer
          nullable: true
        defaultReps:
          type: string
          nullable: true
          description: Free text since targets mix rep ranges and durations, e.g. "8-10" or "20-30 sec"
        createdByUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ExerciseCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Cable Lat Pulldown
        formCue:
          type: string
        defaultSets:
          type: integer
          minimum: 1
          example: 3
        defaultReps:
          type: string
          description: 'Free text — rep ranges or durations, e.g. "8-12" or "30 sec"'
          example: 8-12
        videoUrl:
          type: string
        imageUrl:
          type: string

    ProgressionSuggestion:
      type: object
      properties:
        hasHistory:
          type: boolean
        last:
          $ref: "#/components/schemas/WorkoutSetLog"
        suggestion:
          type: object
          properties:
            reps:
              type: integer
              nullable: true
            weightKg:
              type: number
              nullable: true
            durationSeconds:
              type: integer
              nullable: true

    WorkoutLog:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        venue:
          type: string
          example: Home
        loggedAt:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
        sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSetLog"

    WorkoutLogCreate:
      type: object
      required: [venue]
      properties:
        venue:
          type: string
          example: Gym
        notes:
          type: string
        loggedAt:
          type: string
          format: date-time
          description: When the session happened. Omit for now; set it to backfill a session missed on the day.
          example: "2026-07-20T18:30:00.000Z"

    WorkoutSetLog:
      type: object
      properties:
        id:
          type: string
        workoutLogId:
          type: string
        exerciseId:
          type: string
        exercise:
          $ref: "#/components/schemas/Exercise"
        setNumber:
          type: integer
        reps:
          type: integer
          nullable: true
        weightKg:
          type: number
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        completedAt:
          type: string
          format: date-time

    WorkoutSetLogCreate:
      type: object
      required: [exerciseId, setNumber]
      properties:
        exerciseId:
          type: string
        setNumber:
          type: integer
          example: 1
        reps:
          type: integer
          example: 12
        weightKg:
          type: number
          example: 10
        durationSeconds:
          type: integer
          example: 30

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  userCount:
                    type: integer

  /auth/signup:
    post:
      summary: Create an account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      summary: Log in and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /me:
    get:
      summary: Get the logged-in user's basic identity
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /profile:
    get:
      summary: Get the logged-in user's profile (with computed TDEE)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      summary: Update profile fields and/or log current weight
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /foods:
    get:
      summary: Search food items by name, or browse recents/available foods
      description: >-
        With `search`, does a case-insensitive substring match on name.
        Without it, returns the user's recently-logged foods first (each
        flagged `isRecent: true`), then fills the rest of the list up to 20
        with other available foods.
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Matching food items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodItem"
    post:
      summary: Create a custom food item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodItemCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodItem"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /foods/import:
    post:
      summary: Import a food from a claude.ai macro-estimate JSON file
      description: >-
        Creates a CUSTOM food from the fixed macro-import shape (see
        FoodImport) — the file a user might export from a claude.ai chat
        after discussing a meal or nutrition label. Client sends the parsed
        file contents as the request body; there's no multipart upload.
        Returns the created FoodItem so the client can immediately offer to
        log it (user reviews and confirms, same as vision-log — nothing here
        creates a LogEntry).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodImport"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodItem"
        "400":
          description: Missing/invalid fields, or totalMacros doesn't match macrosPer100g × weight/100
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /foods/mine:
    get:
      summary: List the logged-in user's own custom foods
      responses:
        "200":
          description: Custom foods created by this user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodItem"

  /foods/{id}:
    patch:
      summary: Edit a custom food's name, macros, and/or photo
      description: >-
        Only the food's creator may edit it. If any macro field changes, all
        existing LogEntry rows for this food are recalculated using the new
        per-100g values (fixing a data-entry mistake corrects history too).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodItem"
        "404":
          description: Not found, or not owned by this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a custom food
      description: >-
        Only the food's creator may delete it. Foods that already have log
        entries can't be deleted (the log history depends on them) — the
        request is rejected with 409 instead.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found, or not owned by this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Food has logged entries and can't be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /foods/barcode/{barcode}:
    get:
      summary: Look up a food item by barcode
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs:
    get:
      summary: Get log entries and totals for a given day (defaults to today)
      parameters:
        - name: date
          in: query
          description: YYYY-MM-DD, defaults to today (UTC)
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLog"
    post:
      summary: Log a food entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogEntryCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogEntry"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Food item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs/streak:
    get:
      summary: Get the user's current and longest logging streak
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentStreak:
                    type: integer
                  longestStreak:
                    type: integer
                  loggedToday:
                    type: boolean

  /logs/range:
    get:
      summary: Per-day calorie/protein totals for the last N days
      description: >-
        Returns one entry per day, oldest first, zero-filled for days with no
        logs — sized for a fixed-width trend chart.
      parameters:
        - name: days
          in: query
          description: Number of days to include (default 7, max 90)
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  days:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          example: "2026-07-13"
                        calories:
                          type: number
                        protein:
                          type: number

  /logs/{id}:
    patch:
      summary: Edit a log entry's serving size and/or meal type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                servingGrams:
                  type: number
                  example: 150
                mealType:
                  $ref: "#/components/schemas/MealType"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a log entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /weight-logs:
    get:
      summary: Get weight history
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightLog"
    post:
      summary: Log a weight entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeightLogCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightLog"
        "400":
          description: Missing weightKg
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /vision-log:
    post:
      summary: Analyze a food photo with Claude vision (label or plate mode)
      description: >-
        `label` mode reads a printed nutrition label and returns exact
        per-100g macros. `plate` mode estimates a meal's ingredients and
        macros as a min/max range rather than a false-precise single number.
        Rate-limited per user (rolling 24h window). The client must always
        show the result in an editable review form before saving anything —
        this endpoint only returns an estimate, it never logs or creates
        records itself.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisionLogRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionLogResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Claude declined to analyze the image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Daily scan limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /exercises:
    get:
      summary: List exercises (seeded catalog + user's own custom exercises)
      parameters:
        - name: dayTag
          in: query
          description: Filter to one day of the seeded routine, e.g. "Monday"
          schema:
            type: string
      responses:
        "200":
          description: Matching exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"
    post:
      summary: Create a custom exercise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExerciseCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "400":
          description: Missing name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /exercises/{id}/progression:
    get:
      summary: Rule-based progression suggestion from the user's own history for this exercise
      description: >-
        No AI — a fixed rule from the most recent set logged for this
        exercise: +2.5kg if weighted, +5 sec if a timed hold, +1 rep
        otherwise.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Progression suggestion (or hasHistory:false if never logged)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressionSuggestion"

  /workout-logs:
    get:
      summary: List the user's recent workout sessions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent sessions, newest first, each with its logged sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutLog"
    post:
      summary: Start a new workout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutLogCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutLog"
        "400":
          description: Missing venue or invalid loggedAt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workout-logs/{id}:
    get:
      summary: Get one workout session with its logged sets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutLog"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a workout session and its sets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workout-logs/{id}/sets:
    post:
      summary: Log a set within a workout session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutSetLogCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSetLog"
        "400":
          description: Missing exerciseId or setNumber
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workout log not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workout-logs/{id}/sets/{setId}:
    delete:
      summary: Delete a single logged set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: setId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
