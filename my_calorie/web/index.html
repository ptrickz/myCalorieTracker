<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- No manual viewport meta tag: Flutter Web injects and manages its own
       at runtime, and warns/replaces any pre-existing one. -->
  <meta name="description" content="Calorie and protein tracking with weigh-in trends and streaks.">
  <meta name="theme-color" content="#0D0D0D">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyCalorie">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MyCalorie</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      background-color: #0D0D0D;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0D0D0D;
      z-index: 9999;
    }

    #app-loading .spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid #2A2A2A;
      border-top-color: #C6FF3D;
      animation: app-loading-spin 0.8s linear infinite;
    }

    @keyframes app-loading-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!--
    Shown while the Flutter engine boots (initial load, and the brief reboot
    Safari triggers on an edge-swipe-back gesture with no in-app history to
    return to) — replaces a bare black screen with visible progress.
    Removed automatically once Flutter renders its first frame.
  -->
  <div id="app-loading"><div class="spinner"></div></div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener("flutter-first-frame", function () {
      var loader = document.getElementById("app-loading");
      if (loader) loader.remove();
    });
  </script>
</body>
</html>
